<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Repo Learner 设置</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 24px; max-width: 480px; color: #1f2328; }
    h1 { font-size: 18px; margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 13px; box-sizing: border-box; margin-bottom: 16px; }
    button { padding: 8px 16px; background: #0969da; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #0860ca; }
    .hint { font-size: 11px; color: #57606a; margin-top: -12px; margin-bottom: 16px; }
    #status { margin-top: 12px; font-size: 13px; color: #1a7f37; }
  </style>
</head>
<body>
  <h1>Repo Learner 设置</h1>

  <label for="deepseekKey">DeepSeek API Key *</label>
  <input type="password" id="deepseekKey" placeholder="sk-..." />
  <p class="hint">必填。从 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a> 获取。</p>

  <label for="githubToken">GitHub Personal Access Token（可选）</label>
  <input type="password" id="githubToken" placeholder="ghp_..." />
  <p class="hint">不填时 GitHub API 限速 60次/小时。建议填写以提升到 5000次/小时。</p>

  <button id="save">保存</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
